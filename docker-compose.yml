version: '3.8'

services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:15-alpine
    container_name: exchange-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exchange_db
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - exchange-network

  # ===== Redis Master =====
  redis-master:
    image: redis:7.2-alpine
    container_name: exchange-redis-master
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data/master:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - exchange-network

  # ===== Redis Replica =====
  redis-replica:
    image: redis:7.2-alpine
    container_name: exchange-redis-replica
    ports:
      - "6380:6379"
    volumes:
      - ./redis-data/replica:/data
    command: redis-server --replicaof redis-master 6379 --requirepass canwia123 --masterauth canwia123 --appendonly yes
    depends_on:
      - redis-master
    restart: always
    networks:
      - exchange-network

  # ===== Redis Sentinel =====
  redis-sentinel:
    image: redis:7.2-alpine
    container_name: exchange-redis-sentinel
    ports:
      - "26379:26379"
    volumes:
      - ./sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
      - redis-replica
    restart: always
    networks:
      - exchange-network

networks:
  exchange-network:
    driver: bridge